name: Build Tauri App

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }} --bundles app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Zip the .app bundle
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/macos
          zip -r "$GITHUB_WORKSPACE/MuralMapper-${{ matrix.target }}.zip" "Mural Mapper.app"

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: MuralMapper-${{ matrix.target }}
          path: MuralMapper-${{ matrix.target }}.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: MuralMapper-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Delete existing release if present
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Mural Mapper — Latest Build
          draft: false
          prerelease: false
          make_latest: true
          body: |
            Latest build of Mural Mapper.

            **macOS (Apple Silicon M1/M2/M3/M4):** `MuralMapper-aarch64-apple-darwin.zip`
            **macOS (Intel):** `MuralMapper-x86_64-apple-darwin.zip`
            **Windows:** `.msi` or `.exe` installer

            ### macOS install instructions
            ```
            cd ~/Downloads
            unzip MuralMapper-aarch64-apple-darwin.zip
            mv "Mural Mapper.app" /Applications/
            xattr -cr "/Applications/Mural Mapper.app"
            open "/Applications/Mural Mapper.app"
            ```
          files: |
            artifacts/**/*.zip
            artifacts/**/*.msi
            artifacts/**/*.exe
