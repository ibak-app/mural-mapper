name: Build Tauri App

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: MuralMapper-macOS-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: MuralMapper-Windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Mural Mapper — Latest Build
          draft: false
          prerelease: false
          make_latest: true
          body: |
            Latest build of Mural Mapper.

            **macOS (Apple Silicon M1/M2/M3):** Download `MuralMapper-macOS-aarch64-apple-darwin`
            **macOS (Intel):** Download `MuralMapper-macOS-x86_64-apple-darwin`
            **Windows:** Download `MuralMapper-Windows`

            ### macOS install
            ```bash
            # After downloading the .dmg, open it, drag to Applications, then run:
            xattr -cr /Applications/Mural\ Mapper.app
            # Now open it normally
            ```
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
